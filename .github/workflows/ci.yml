# ────────────────────────────────────────────────────────
# .github/workflows/ci.yml — CI/CD Pipeline
# ────────────────────────────────────────────────────────
#
# This GitHub Actions workflow runs on every push/PR to main.
#
# Pipeline stages:
#   1. backend-test  → lint + run pytest
#   2. frontend-test → install + build check
#   3. docker-build  → build images (validates Dockerfiles)
#
# Concepts: CI/CD, automated testing, GitHub Actions, job dependencies

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────
  # Job 1: Backend — Lint + Test
  # ─────────────────────────────────────────
  backend-test:
    name: 🐍 Backend Tests
    runs-on: ubuntu-latest

    services:
      # Spin up a real PostgreSQL for integration tests
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Run Tests with pytest
        working-directory: ./backend
        run: pytest tests/ -v --tb=short
        env:
          # Tests use SQLite override (see test_tasks.py fixture)
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: test-secret-key

  # ─────────────────────────────────────────
  # Job 2: Frontend — Build Check
  # ─────────────────────────────────────────
  frontend-test:
    name: ⚛️  Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build (production)
        working-directory: ./frontend
        run: npm run build

  # ─────────────────────────────────────────
  # Job 3: Docker Build Validation
  # ─────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]   # Only runs if both tests pass!

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t taskapi:ci ./backend

      - name: Build Frontend Image
        run: docker build -t taskreact:ci ./frontend

      # Optional: push to Docker Hub or AWS ECR here
      # - name: Push to ECR
      #   run: |
      #     aws ecr get-login-password | docker login ...
      #     docker push <ecr-url>/taskapi:latest
